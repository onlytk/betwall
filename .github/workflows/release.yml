name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Stage artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/betwall.exe -DestinationPath betwall-x86_64-pc-windows-msvc.zip

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: betwall-x86_64-pc-windows-msvc
          path: betwall-x86_64-pc-windows-msvc.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: betwall-x86_64-pc-windows-msvc.zip
          generate_release_notes: true
          draft: false
          prerelease: false
