name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/release/betwall.exe dist/
          Copy-Item tray-icon.png dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath betwall-windows-x64.zip

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: betwall-windows-x64
          path: betwall-windows-x64.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            betwall-windows-x64.zip
            target/release/betwall.exe
          generate_release_notes: true
          draft: false
          prerelease: false
